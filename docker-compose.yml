version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_clientes
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: clientes_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: